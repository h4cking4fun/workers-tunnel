name = "workers-tunnel"
main = "build/worker/shim.mjs"
compatibility_date = "2024-09-02"

[build]
command = "cargo install -q worker-build && worker-build --release"

[observability]
enabled = true
head_sampling_rate = 1

[vars]
USER_ID = ""
SHOW_URI = "true"
PROXY_IP = ""
FALLBACK_SITE = ""
DEBUG_LOG = "false"
MUX_BACKEND_URL = ""
